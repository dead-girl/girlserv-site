<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loudmouths | GirlServ</title>

  <style>
    :root {
      --ink: #fff8fd;
      --muted: #dcc7dc;
      --pink: #ff4aa5;
      --hotpink: #ff128f;
      --purple: #9d6cff;
      --aqua: #67e9ff;
      --lime: #d8ff5e;
      --paper: #fff4ea;
      --black: #0b0b10;
      --panel: rgba(18, 10, 28, 0.92);
      --shadow: 5px 5px 0 #000;
      --yellow: #ffe45c;
      --paper2: #f2efe7;
      --paper5: #f6e7bf;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Trebuchet MS", "Comic Sans MS", Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 74, 165, 0.26), transparent 22%),
        radial-gradient(circle at 88% 10%, rgba(103, 233, 255, 0.20), transparent 20%),
        radial-gradient(circle at 18% 88%, rgba(216, 255, 94, 0.12), transparent 18%),
        radial-gradient(circle at 85% 82%, rgba(157, 108, 255, 0.20), transparent 26%),
        linear-gradient(180deg, #120716 0%, #0c0610 46%, #050308 100%);
      overflow-x: hidden;
      padding: 18px;
    }

    body::before {
      content: "♡ ★ xoxo ★ burn book ★ coolour ★ girlserv ★ memories ★";
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: rgba(255,255,255,0.045);
      font-size: 34px;
      line-height: 125px;
      letter-spacing: 8px;
      transform: rotate(-7deg) scale(1.12);
      white-space: pre-wrap;
      z-index: 0;
    }

    a { color: inherit; text-decoration: none; }

    .page-shell {
      position: relative;
      z-index: 1;
      width: min(1600px, calc(100% - 22px));
      margin: 12px auto 26px;
    }

    .top-bar {
      position: relative;
      z-index: 25;
      display: flex;
      align-items: center;
      gap: 18px;
      margin: 0 auto 10px;
      padding: 9px 14px;
      border: 2px solid #000;
      border-radius: 18px;
      background:
        repeating-linear-gradient(0deg, rgba(103, 233, 255, 0.12) 0 1px, transparent 1px 22px),
        linear-gradient(90deg, transparent 0 26px, rgba(255, 18, 143, 0.22) 26px 28px, transparent 28px),
        rgba(255, 244, 234, 0.96);
      box-shadow: 6px 6px 0 #000;
      color: #111;
    }

    .mini-logo {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--hotpink);
      -webkit-text-stroke: 1px #000;
      text-shadow: 2px 2px 0 #fff, 4px 4px 0 #000;
      font-size: clamp(25px, 3vw, 42px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -1px;
      transform-origin: center;
    }

    .mini-logo:hover,
    .mini-logo:focus-visible {
      animation: logoWiggle 0.38s linear infinite;
      outline: none;
    }

    @keyframes logoWiggle {
      0%, 100% { transform: rotate(0deg) translate(0, 0); }
      20% { transform: rotate(-4deg) translate(-1px, 1px); }
      40% { transform: rotate(3deg) translate(1px, -1px); }
      60% { transform: rotate(-2deg) translate(1px, 1px); }
      80% { transform: rotate(4deg) translate(-1px, -1px); }
    }

    .top-nav {
      flex: 1 1 auto;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px 7px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .top-nav-item {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .nav-text {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 5px 9px;
      border-radius: 999px;
      color: #111;
      font-size: clamp(12px, 1.02vw, 15px);
      font-weight: 900;
      white-space: nowrap;
      transition: background 0.12s ease, color 0.12s ease, transform 0.12s ease;
    }

    .nav-text:hover,
    .nav-text:focus-visible,
    .top-nav-item:hover .nav-text {
      color: #fff;
      background: #111;
      transform: translateY(-1px);
      outline: none;
    }

    .top-nav-item.is-current .nav-text {
      color: rgba(17,17,17,0.58);
      background: rgba(0,0,0,0.08);
      cursor: default;
      pointer-events: none;
    }

    .nav-preview {
      position: absolute;
      top: calc(100% + 9px);
      left: 50%;
      transform: translateX(-50%) translateY(-5px) rotate(var(--r, -2deg));
      width: min(255px, 26vw);
      min-width: 190px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 80;
      transition: opacity 0.13s ease, transform 0.13s ease, visibility 0.13s ease;
    }

    .top-nav-item:nth-child(2n) .nav-preview { --r: 2deg; }
    .top-nav-item:nth-child(3n) .nav-preview { --r: -3deg; }

    .top-nav-item:hover .nav-preview,
    .top-nav-item:focus-within .nav-preview {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0) rotate(var(--r, -2deg));
    }

    .nav-preview img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.55));
    }

    .top-nav-item.is-current .nav-preview img {
      filter: grayscale(1) brightness(0.58) contrast(1.05) drop-shadow(0 8px 10px rgba(0,0,0,0.55));
    }

    .nav-preview::after {
      content: attr(data-note);
      position: absolute;
      left: 50%;
      bottom: -10px;
      transform: translateX(-50%) rotate(-2deg);
      color: #111;
      background: #fff4ea;
      border: 2px solid #000;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 900;
      box-shadow: 2px 3px 0 #000;
      white-space: nowrap;
      text-transform: lowercase;
    }

    .top-nav-item.is-current .nav-preview::before {
      content: "you are here";
      position: absolute;
      left: 50%;
      top: -12px;
      transform: translateX(-50%) rotate(2deg);
      color: #111;
      background: #d8ff5e;
      border: 2px solid #000;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 900;
      box-shadow: 2px 3px 0 #000;
      white-space: nowrap;
      z-index: 2;
    }

    .wrap { max-width: 1250px; margin: auto; }

    .panel {
      display: block;
      border: 3px solid #000;
      border-radius: 24px;
      padding: 18px;
      background: rgba(18, 18, 30, 0.96);
      box-shadow: 7px 7px 0 #000;
      margin-bottom: 30px;
    }

    .home-layout {
      display: grid;
      grid-template-columns: minmax(0, 2.1fr) minmax(300px, 0.9fr);
      gap: 14px;
      align-items: start;
      margin-bottom: 14px;
    }

    .board {
      background: #0f0f17;
      border: 2px dashed rgba(255, 63, 143, 0.55);
      border-radius: 18px;
      padding: 14px;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    .board-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 900;
      color: var(--pink);
      margin-bottom: 12px;
    }

    .board-subnote {
      display: inline-block;
      background: var(--paper2);
      color: #111;
      border: 1px solid #999;
      padding: 5px 10px;
      border-radius: 2px;
      transform: rotate(-2deg);
      margin-bottom: 12px;
      margin-left: 8px;
    }

    .top-chatters-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .chatter-col-header {
      display: grid;
      grid-template-columns: 48px 1fr 130px;
      gap: 10px;
      padding: 0 10px 8px;
      color: var(--pink);
      font-weight: 900;
      font-size: 13px;
      border-bottom: 1px dashed rgba(255, 63, 143, 0.4);
      margin-bottom: 8px;
    }

    .chatter-card {
      background: #11111b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .chatter-head {
      width: 100%;
      border: 0;
      cursor: pointer;
      background: transparent;
      color: white;
      font-family: monospace;
      display: grid;
      grid-template-columns: 48px 1fr 130px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      text-align: left;
    }

    .chatter-rank { color: var(--pink); font-size: 18px; font-weight: 900; }
    .chatter-name { color: white; font-size: 15px; font-weight: 900; word-break: break-word; }
    .chatter-words { text-align: right; color: #fff; font-size: 16px; font-weight: 900; }

    .chatter-card.open .chatter-head {
      background:
        linear-gradient(135deg, rgba(255,63,143,0.16), transparent 38%),
        linear-gradient(315deg, rgba(79,220,255,0.12), transparent 38%),
        #151521;
      border-color: var(--yellow);
      box-shadow: 3px 3px 0 #000;
    }

    .chatter-extra {
      display: none;
      padding: 12px;
      background: linear-gradient(180deg, #f1dce4, #f6e7ec);
      color: #111;
      border-top: 1px solid rgba(0,0,0,0.12);
    }

    .chatter-card.open .chatter-extra { display: block; }

    .extra-layout {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .mini-avatar {
      width: 54px;
      height: 54px;
      border: 2px solid #c7a3b2;
      border-radius: 8px;
      background: linear-gradient(135deg, #201423, #4f2a59);
      display: grid;
      place-items: center;
      color: white;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
      overflow: hidden;
    }

    .mini-avatar img,
    .top3-photo img,
    .watch-top-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .extra-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .extra-stat {
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px;
      padding: 6px;
      text-align: center;
    }

    .extra-label { color: #5a4c58; font-size: 10px; text-transform: uppercase; font-weight: 900; }
    .extra-value { color: #111; font-size: 14px; font-weight: 900; margin-top: 4px; }

    .sidebar-stack { display: grid; gap: 14px; }

    .selected-user-board {
      background:
        linear-gradient(135deg, rgba(255,63,143,0.14), transparent 38%),
        linear-gradient(315deg, rgba(79,220,255,0.10), transparent 38%),
        #0f0f17;
    }

    .selected-user-topline { margin-bottom: 10px; }
    .selected-search-wrap { position: relative; }

    .selected-user-search {
      width: 100%;
      border: 2px solid rgba(255,255,255,0.16);
      border-radius: 12px;
      background: #181824;
      color: #fff;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 800;
      outline: none;
      font-family: monospace;
    }

    .selected-user-search::placeholder { color: #d8cad5; }

    .selected-user-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 30;
      display: none;
      background: #1a1a26;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.35);
      max-height: 260px;
      overflow: auto;
    }

    .selected-user-results.open { display: grid; gap: 5px; }

    .selected-user-result {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      background: #191927;
      color: #fff;
      border-radius: 10px;
      padding: 7px 9px;
      font-family: monospace;
      font-weight: 900;
      text-align: left;
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .selected-user-result:hover { background: rgba(255, 63, 143, 0.22); }
    .selected-user-result-score { color: var(--yellow); font-size: 11px; white-space: nowrap; }

    .chatter-expanded-full {
      display: block;
      margin-top: 8px;
      background:
        linear-gradient(135deg, rgba(255,63,143,0.18), transparent 38%),
        linear-gradient(315deg, rgba(79,220,255,0.14), transparent 38%),
        #151521;
      border: 2px dashed rgba(255, 221, 120, 0.75);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 4px 4px 0 #000;
    }

    .chatter-expanded-title {
      color: var(--yellow);
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 10px;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .chatter-expanded-full .extra-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: center;
    }

    .chatter-expanded-full .mini-avatar {
      width: 124px;
      height: 124px;
      margin: 0 auto;
      border: 3px solid #fff;
      outline: 3px solid #000;
      border-radius: 16px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.35);
    }

    .chatter-expanded-full .extra-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .top3-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      align-items: end;
    }

    .top3-card {
      background: var(--paper2);
      color: #111;
      border: 2px solid #c7b398;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.35);
      position: relative;
      min-height: 230px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .top3-card.rank1 { min-height: 255px; background: #f1e6df; }
    .top3-card.rank2 { transform: rotate(-1deg); }
    .top3-card.rank3 { transform: rotate(1deg); }

    .top3-badge {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%) rotate(-7deg);
      background: var(--yellow);
      color: #111;
      border: 2px solid #000;
      border-radius: 12px;
      padding: 4px 10px;
      font-weight: 900;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.35);
    }

    .top3-photo {
      width: 86px;
      height: 86px;
      margin: 18px auto 10px;
      border: 3px solid #fff;
      outline: 2px solid #d1a9b8;
      border-radius: 8px;
      background: linear-gradient(135deg, #2b2033, #4c3550);
      display: grid;
      place-items: center;
      color: white;
      font-size: 12px;
      font-weight: 900;
      overflow: hidden;
    }

    .top3-name { font-size: 14px; font-weight: 900; margin-top: 4px; word-break: break-word; }

    .top3-score {
      margin: 10px auto 0;
      display: inline-block;
      background: #ffb6d1;
      color: #111;
      font-weight: 900;
      font-size: 16px;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .top3-label { font-size: 12px; color: #444; margin-top: 6px; }

    .watch-wide-board {
      margin-top: 0;
      width: 100%;
      overflow: hidden;
    }

    .watch-slider-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .watch-slider-title {
      color: var(--yellow);
      font-size: 16px;
      font-weight: 900;
    }

    .watch-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .watch-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 2px solid #000;
      background: #fff;
      opacity: 0.45;
      cursor: pointer;
    }

    .watch-dot.active {
      opacity: 1;
      background: var(--pink);
    }

    .watch-slider-viewport {
      overflow: hidden;
      border-radius: 12px;
    }

    .watch-slider-track {
      display: flex;
      transition: transform 0.45s ease;
      will-change: transform;
    }

    .watch-slide {
      min-width: 100%;
      width: 100%;
    }

    .watch-carousel {
      display: grid;
      grid-template-columns: repeat(3,minmax(0,1fr));
      gap: 10px;
      min-height: 275px;
    }

    .watch-carousel-card {
      min-height: 225px;
      background: var(--paper2);
      color: #111;
      border: 2px solid #c7b398;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    }

    .watch-top-rank {
      display: inline-block;
      background: var(--yellow);
      color: #111;
      border: 2px solid #000;
      border-radius: 10px;
      padding: 4px 8px;
      font-weight: 900;
      margin-top: 2px;
      margin-bottom: 10px;
    }

    .watch-top-photo {
      width: 96px;
      height: 96px;
      margin: 0 auto 10px;
      border: 3px solid #fff;
      outline: 2px solid #d1a9b8;
      border-radius: 10px;
      background: #111;
      overflow: hidden;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
    }

    .watch-carousel-name {
      font-size: 17px;
      font-weight: 900;
      word-break: break-word;
      line-height: 1.1;
    }

    .watch-carousel-score {
      margin: 10px auto 0;
      display: inline-block;
      background: #ffb6d1;
      color: #111;
      font-weight: 900;
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .watch-carousel-note {
      font-size: 12px;
      color: #444;
      margin-top: 7px;
    }

    .status-note {
      margin-top: 10px;
      display: inline-block;
      background: var(--paper5);
      color: #111;
      border: 1px solid #b9a457;
      padding: 6px 10px;
      border-radius: 8px;
      transform: rotate(-2deg);
      font-weight: 900;
    }

    @media (max-width: 1050px) {
      .home-layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .page-shell {
        width: min(100% - 10px, 1600px);
      }

      .top-bar {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
        padding: 8px 10px;
      }

      .top-nav {
        justify-content: flex-start;
      }

      .nav-preview {
        width: min(220px, 72vw);
      }

      .top-chatters-grid,
      .top3-grid,
      .watch-carousel,
      .chatter-expanded-full .extra-grid,
      .chatter-card .chatter-extra .extra-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <div class="top-bar" aria-label="GirlServ top navigation">
      <a class="mini-logo" href="index.html" aria-label="GirlServ HQ">GirlServ</a>
      <nav class="top-nav" aria-label="GirlServ pages">
        <span class="top-nav-item" data-page="index.html">
          <a class="nav-text" href="index.html">GirlServ HQ</a>
          <span class="nav-preview" data-note="home base" aria-hidden="true"><img src="assets/buttons/girlserv-hq.png" alt=""></span>
        </span>
        <span class="top-nav-item" data-page="loudmouths.html">
          <a class="nav-text" href="loudmouths.html">Loudmouths</a>
          <span class="nav-preview" data-note="top chatters" aria-hidden="true"><img src="assets/buttons/loudmouths.png" alt=""></span>
        </span>
        <span class="top-nav-item" data-page="channel-trolls.html">
          <a class="nav-text" href="channel-trolls.html">Channel Trolls</a>
          <span class="nav-preview" data-note="degenerates" aria-hidden="true"><img src="assets/buttons/channel-trolls.png" alt=""></span>
        </span>
        <span class="top-nav-item" data-page="lol-lords.html">
          <a class="nav-text" href="lol-lords.html">LOL Lords</a>
          <span class="nav-preview" data-note="ha! ha! ha!" aria-hidden="true"><img src="assets/buttons/lol-lords.png" alt=""></span>
        </span>
        <span class="top-nav-item" data-page="clickbait-crew.html">
          <a class="nav-text" href="clickbait-crew.html">Clickbait Crew</a>
          <span class="nav-preview" data-note="linked by" aria-hidden="true"><img src="assets/buttons/clickbait-crew.png" alt=""></span>
        </span>
        <span class="top-nav-item" data-page="frequent-flyers.html">
          <a class="nav-text" href="frequent-flyers.html">Frequent Flyers</a>
          <span class="nav-preview" data-note="repeat joiners" aria-hidden="true"><img src="assets/buttons/frequent-flyers.png" alt=""></span>
        </span>
        <span class="top-nav-item" data-page="stat-dump.html">
          <a class="nav-text" href="stat-dump.html">Stat Dump</a>
          <span class="nav-preview" data-note="totals" aria-hidden="true"><img src="assets/buttons/stat-dump.png" alt=""></span>
        </span>
        <span class="top-nav-item" data-page="girls-notes.html">
          <a class="nav-text" href="girls-notes.html">Girl's Notes</a>
          <span class="nav-preview" data-note="no entry!" aria-hidden="true"><img src="assets/buttons/girls-notes.png" alt=""></span>
        </span>
        <span class="top-nav-item" data-page="room-reports.html">
          <a class="nav-text" href="room-reports.html">Room Reports</a>
          <span class="nav-preview" data-note="channel receipts" aria-hidden="true"><img src="assets/buttons/room-reports.png" alt=""></span>
        </span>
        <span class="top-nav-item" data-page="the-girlbook.html">
          <a class="nav-text" href="the-girlbook.html">Girlbook</a>
          <span class="nav-preview" data-note="drop the &quot;the&quot;" aria-hidden="true"><img src="assets/buttons/the-girlbook.png" alt=""></span>
        </span>
      </nav>
    </div>

    <div class="wrap">
      <section class="panel active" id="panel-chatters">
        <div class="home-layout">
          <div class="board">
            <div class="board-title">★ Top Chatters ♡</div>
            <div class="board-subnote">word crimes logged ♡</div>
            <div id="json-status-left"></div>

            <div class="top-chatters-grid">
              <div>
                <div class="chatter-col-header"><span>#</span><span>Nick</span><span>Words</span></div>
                <div id="chatters-left"></div>
              </div>
              <div>
                <div class="chatter-col-header"><span>#</span><span>Nick</span><span>Words</span></div>
                <div id="chatters-right"></div>
              </div>
            </div>
          </div>

          <div class="sidebar-stack">
            <div class="board selected-user-board">
              <div class="selected-user-topline">
                <div class="selected-search-wrap">
                  <input id="selected-user-search" class="selected-user-search" type="search" placeholder="search nick..." autocomplete="off">
                  <div id="selected-user-results" class="selected-user-results"></div>
                </div>
              </div>
              <div class="chatter-expanded-full open" id="chatter-expanded-full">loading...</div>
            </div>

            <div class="board">
              <div class="board-title">☆ #truth-seekers</div>
              <div id="json-status-top3"></div>
              <div class="top3-grid" id="top3-grid"></div>
            </div>
          </div>
        </div>

        <div class="board watch-wide-board">
          <div class="board-title">Users To Keep An Eye On</div>
          <div class="watch-slider-head">
            <div class="watch-slider-title" id="watch-slider-title">loading...</div>
            <div class="watch-dots" id="watch-dots"></div>
          </div>
          <div id="json-status-watch"></div>
          <div class="watch-slider-viewport">
            <div class="watch-slider-track" id="watch-slider-track"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
const currentPage = (() => {
  const file = window.location.pathname.split("/").pop() || "index.html";
  if (file === "" || file === "index.html") return "index.html";
  if (file === "loudmouths") return "loudmouths.html";
  if (file === "channel-trolls") return "channel-trolls.html";
  if (file === "lol-lords") return "lol-lords.html";
  if (file === "clickbait-crew") return "clickbait-crew.html";
  if (file === "frequent-flyers") return "frequent-flyers.html";
  if (file === "stat-dump") return "stat-dump.html";
  if (file === "girls-notes") return "girls-notes.html";
  if (file === "room-reports") return "room-reports.html";
  if (file === "girlbook" || file === "the-girlbook") return "the-girlbook.html";
  return file;
})();

document.querySelectorAll(".top-nav-item[data-page]").forEach(item => {
  const page = item.dataset.page;
  const isCurrent = page === currentPage;
  if (!isCurrent) return;

  item.classList.add("is-current");
  const link = item.querySelector(".nav-text");
  if (link) {
    link.setAttribute("aria-current", "page");
    link.removeAttribute("href");
    link.addEventListener("click", event => event.preventDefault());
  }
});

    const DATA_URLS = [
      "channel-stats/truth_seekers_user_stats.json",
      "truth_seekers_user_stats.json",
      "./truth_seekers_user_stats.json"
    ];

    let watchSlides = [];
    let watchIndex = 0;
    let watchTimer = null;

    function fmt(n){ return Number(n||0).toLocaleString("en-US"); }

    function esc(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;");
    }

    function status(elId, text){
      const el = document.getElementById(elId);
      if(!el) return;
      el.innerHTML = text ? `<div class="status-note">${esc(text)}</div>` : "";
    }

    function normNick(nick){
      return String(nick || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function hashNick(nick){
      let h = 0;
      const s = String(nick || "");
      for(let i = 0; i < s.length; i++){
        h = (h * 31 + s.charCodeAt(i)) >>> 0;
      }
      return h;
    }

    function fallbackAvatar(nick){
      const num = (hashNick(nick) % 30) + 1;
      return `avatars/avatar-${String(num).padStart(2, "0")}.png`;
    }

    function customAvatar(nick){
      return `avatars/custom-${normNick(nick)}.png`;
    }

    function avatarMarkup(nick){
      const custom = customAvatar(nick);
      const fallback = fallbackAvatar(nick);
      return `<div class="mini-avatar"><img src="${custom}" alt="${esc(nick)}" onerror="this.onerror=null;this.src='${fallback}'"></div>`;
    }

    function avatarPhotoMarkup(nick, cls){
      const custom = customAvatar(nick);
      const fallback = fallbackAvatar(nick);
      return `<div class="${cls}"><img src="${custom}" alt="${esc(nick)}" onerror="this.onerror=null;this.src='${fallback}'"></div>`;
    }

    function entriesFrom(raw){
      return Object.entries(raw || {}).map(([nick, stats]) => ({
        nick,
        words:Number(stats?.words||0),
        joins:Number(stats?.joins||0),
        lol:Number(stats?.lol||0),
        degeneracy:Number(stats?.degeneracy||0),
        links:Number(stats?.links||0)
      })).filter(u => u.nick.toLowerCase() !== "girl")
        .sort((a,b)=>b.words-a.words);
    }

    function renderSelected(user){
      const root = document.getElementById("chatter-expanded-full");
      if(!user){
        root.textContent = "truthseekers stats .json can't load";
        return;
      }
      root.innerHTML = `
        <div class="chatter-expanded-title">${esc(user.nick)}</div>
        <div class="extra-layout">
          ${avatarMarkup(user.nick)}
          <div class="extra-grid">
            <div class="extra-stat"><div class="extra-label">words</div><div class="extra-value">${fmt(user.words)}</div></div>
            <div class="extra-stat"><div class="extra-label">joins</div><div class="extra-value">${fmt(user.joins)}</div></div>
            <div class="extra-stat"><div class="extra-label">lol</div><div class="extra-value">${fmt(user.lol)}</div></div>
            <div class="extra-stat"><div class="extra-label">links</div><div class="extra-value">${fmt(user.links)}</div></div>
            <div class="extra-stat"><div class="extra-label">chaos</div><div class="extra-value">${fmt(user.degeneracy)}</div></div>
            <div class="extra-stat"><div class="extra-label">contribution</div><div class="extra-value">${fmt(user.words)}</div></div>
          </div>
        </div>
      `;
    }

    function renderChatters(top30){
      document.getElementById("chatters-left").innerHTML = top30.slice(0,15).map((u,i)=>`
        <div class="chatter-card" data-nick="${esc(u.nick)}">
          <button class="chatter-head" type="button">
            <div class="chatter-rank">#${i+1}</div>
            <div class="chatter-name">${esc(u.nick)}</div>
            <div class="chatter-words">${fmt(u.words)}</div>
          </button>
          <div class="chatter-extra">
            <div class="extra-layout">
              ${avatarMarkup(u.nick)}
              <div class="extra-grid">
                <div class="extra-stat"><div class="extra-label">joins</div><div class="extra-value">${fmt(u.joins)}</div></div>
                <div class="extra-stat"><div class="extra-label">lol</div><div class="extra-value">${fmt(u.lol)}</div></div>
                <div class="extra-stat"><div class="extra-label">chaos</div><div class="extra-value">${fmt(u.degeneracy)}</div></div>
                <div class="extra-stat"><div class="extra-label">links</div><div class="extra-value">${fmt(u.links)}</div></div>
              </div>
            </div>
          </div>
        </div>
      `).join("");

      document.getElementById("chatters-right").innerHTML = top30.slice(15,30).map((u,i)=>`
        <div class="chatter-card" data-nick="${esc(u.nick)}">
          <button class="chatter-head" type="button">
            <div class="chatter-rank">#${i+16}</div>
            <div class="chatter-name">${esc(u.nick)}</div>
            <div class="chatter-words">${fmt(u.words)}</div>
          </button>
          <div class="chatter-extra">
            <div class="extra-layout">
              ${avatarMarkup(u.nick)}
              <div class="extra-grid">
                <div class="extra-stat"><div class="extra-label">joins</div><div class="extra-value">${fmt(u.joins)}</div></div>
                <div class="extra-stat"><div class="extra-label">lol</div><div class="extra-value">${fmt(u.lol)}</div></div>
                <div class="extra-stat"><div class="extra-label">chaos</div><div class="extra-value">${fmt(u.degeneracy)}</div></div>
                <div class="extra-stat"><div class="extra-label">links</div><div class="extra-value">${fmt(u.links)}</div></div>
              </div>
            </div>
          </div>
        </div>
      `).join("");

      document.querySelectorAll(".chatter-head").forEach(head => {
        head.addEventListener("click", () => {
          const card = head.closest(".chatter-card");
          card.classList.toggle("open");
          const nick = card.dataset.nick;
          const user = top30.find(u => u.nick === nick);
          renderSelected(user);
        });
      });
    }

    function renderTop3(top3){
      const ordered = [top3[1], top3[0], top3[2]].filter(Boolean);
      const ranks = [2,1,3];
      document.getElementById("top3-grid").innerHTML = ordered.map((u, idx) => `
        <div class="top3-card rank${ranks[idx]}">
          <div class="top3-badge">#${ranks[idx]}</div>
          ${avatarPhotoMarkup(u.nick, "top3-photo")}
          <div class="top3-name">${esc(u.nick)}</div>
          <div class="top3-score">${fmt(u.words)}</div>
          <div class="top3-label">words</div>
        </div>
      `).join("");
    }

    function buildWatchSlides(all){
      return [
        {
          title: "Most Joins",
          note: "always coming back",
          items: [...all].sort((a,b)=>b.joins-a.joins).slice(0,3),
          score: u => `${fmt(u.joins)} joins`
        },
        {
          title: "Biggest LOL Menace",
          note: "giggly little pest",
          items: [...all].sort((a,b)=>b.lol-a.lol).slice(0,3),
          score: u => `${fmt(u.lol)} lol`
        },
        {
          title: "Chaos Goblin",
          note: "needs supervision",
          items: [...all].sort((a,b)=>b.degeneracy-a.degeneracy).slice(0,3),
          score: u => `${fmt(u.degeneracy)} chaos`
        },
        {
          title: "Link Gremlin",
          note: "keeps posting things",
          items: [...all].sort((a,b)=>b.links-a.links).slice(0,3),
          score: u => `${fmt(u.links)} links`
        }
      ];
    }

    function renderWatchSlider(){
      const track = document.getElementById("watch-slider-track");
      const dots = document.getElementById("watch-dots");

      track.innerHTML = watchSlides.map(slide => `
        <div class="watch-slide">
          <div class="watch-carousel">
            ${slide.items.map((u, idx) => `
              <div class="watch-carousel-card">
                <div class="watch-top-rank">#${idx+1}</div>
                ${avatarPhotoMarkup(u.nick, "watch-top-photo")}
                <div class="watch-carousel-name">${esc(u.nick)}</div>
                <div class="watch-carousel-score">${slide.score(u)}</div>
                <div class="watch-carousel-note">${esc(slide.note)}</div>
              </div>
            `).join("")}
          </div>
        </div>
      `).join("");

      dots.innerHTML = watchSlides.map((_, idx) => `
        <button type="button" class="watch-dot${idx === 0 ? " active" : ""}" data-index="${idx}" aria-label="Go to slide ${idx+1}"></button>
      `).join("");

      dots.querySelectorAll(".watch-dot").forEach(dot => {
        dot.addEventListener("click", () => {
          goWatchSlide(Number(dot.dataset.index), true);
        });
      });

      goWatchSlide(0, false);
      startWatchSlider();
    }

    function goWatchSlide(index, restart){
      watchIndex = index % watchSlides.length;
      document.getElementById("watch-slider-track").style.transform = `translateX(-${watchIndex * 100}%)`;
      document.getElementById("watch-slider-title").textContent = watchSlides[watchIndex].title;
      document.querySelectorAll(".watch-dot").forEach((dot, idx) => {
        dot.classList.toggle("active", idx === watchIndex);
      });
      if(restart) startWatchSlider();
    }

    function startWatchSlider(){
      if(watchTimer) clearInterval(watchTimer);
      watchTimer = setInterval(() => {
        goWatchSlide((watchIndex + 1) % watchSlides.length, false);
      }, 3500);
    }

    function setupSearch(all){
      const input = document.getElementById("selected-user-search");
      const results = document.getElementById("selected-user-results");

      input.addEventListener("input", () => {
        const q = input.value.trim().toLowerCase();
        if(!q){
          results.classList.remove("open");
          results.innerHTML = "";
          return;
        }
        const matches = all.filter(u => u.nick.toLowerCase().includes(q)).slice(0,8);
        results.innerHTML = matches.map(u => `
          <div class="selected-user-result" data-nick="${esc(u.nick)}">
            <span>${esc(u.nick)}</span>
            <span class="selected-user-result-score">${fmt(u.words)}</span>
          </div>
        `).join("");
        results.classList.toggle("open", matches.length > 0);
        results.querySelectorAll(".selected-user-result").forEach(row => {
          row.addEventListener("click", () => {
            const user = all.find(u => u.nick === row.dataset.nick);
            input.value = user.nick;
            results.classList.remove("open");
            renderSelected(user);
          });
        });
      });

      document.addEventListener("click", (e) => {
        if(!e.target.closest(".selected-search-wrap")) results.classList.remove("open");
      });
    }

    async function loadData(){
      for(const url of DATA_URLS){
        try{
          const res = await fetch(url, { cache:"no-store" });
          if(res.ok){
            return await res.json();
          }
        }catch(e){}
      }
      throw new Error("json failed");
    }

    async function boot(){
      try{
        const raw = await loadData();
        const all = entriesFrom(raw);
        const top30 = all.slice(0,30);
        renderChatters(top30);
        renderTop3(top30.slice(0,3));
        watchSlides = buildWatchSlides(all);
        renderWatchSlider();
        renderSelected(top30[0] || null);
        setupSearch(all);
      }catch(e){
        status("json-status-left", "truthseekers stats .json can't load");
        status("json-status-top3", "truthseekers stats .json can't load");
        status("json-status-watch", "truthseekers stats .json can't load");
        renderSelected(null);
      }
    }

    boot();
  </script>
</body>
