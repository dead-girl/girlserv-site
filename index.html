<!DOCTYPE html>
<html>
<head>
  <title>GirlServ</title>
  <style>
    body {
      background: #0a0a0a;
      color: #dcdcdc;
      font-family: monospace;
      padding: 20px;
    }
    h1 { color: #ff4d6d; }
    a { color: #8be9fd; }
    .box {
      border: 1px solid #333;
      padding: 15px;
      margin-top: 15px;
    }
    .user { color: #8be9fd; }
  </style>
</head>
<body>

<h1>GirlServ</h1>
<p>she is watching</p>
<p><a href="stats.html">view more stats</a></p>

<div class="box">
  <h2>Top Users</h2>
  <div id="top-users"></div>
</div>

<div class="box">
  <h2>Most Annoying</h2>
  <div id="annoying"></div>
</div>

<div class="box">
  <h2>Status</h2>
  <p id="status"></p>
</div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const top = document.getElementById('top-users');
    data.top_users.forEach(u => {
      top.innerHTML += `<p><span class="user">${u.name}</span> — ${u.messages} messages</p>`;
    });

    const annoying = document.getElementById('annoying');
    data.annoying.forEach(u => {
      annoying.innerHTML += `<p><span class="user">${u.name}</span> — ${u.flags} flags</p>`;
    });

    document.getElementById('status').innerText = data.status;
  });
</script>

</body>
</html>
