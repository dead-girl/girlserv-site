<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Girlbook | GirlServ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --paper:#fffdf8;
      --ink:#111;
      --line:#111;
      --pink:#ffd7ea;
      --blue:#dff1ff;
      --yellow:#fff4b8;
      --mint:#e4ffd9;
      --shadow:4px 5px 0 #111;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.7), transparent 22%),
        linear-gradient(180deg, #fff8f2 0%, #fff0f7 100%);
      color:var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    main{
      width:min(1400px, calc(100% - 28px));
      margin:18px auto 42px;
    }

    .hero,
    .section,
    .tool-card,
    .profile-card{
      background:var(--paper);
      border:3px solid var(--line);
      border-radius:32px;
      box-shadow:var(--shadow);
    }

    .hero{
      padding:22px 22px 18px;
      margin-bottom:18px;
    }

    .kicker{
      display:inline-block;
      padding:7px 12px;
      border:2px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-weight:900;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.06em;
      margin-bottom:12px;
    }

    h1{
      margin:0 0 6px;
      font-size:clamp(34px, 5vw, 64px);
      line-height:.95;
      letter-spacing:-2px;
    }

    .hero p{
      margin:0;
      font-size:16px;
      font-weight:700;
    }

    .toolbar{
      display:grid;
      grid-template-columns:1.2fr .8fr .8fr;
      gap:12px;
      margin:18px 0;
    }

    .tool-card{
      padding:14px;
      border-radius:22px;
    }

    .tool-label{
      display:block;
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      margin-bottom:8px;
      letter-spacing:.06em;
    }

    .search{
      width:100%;
      border:2px solid var(--line);
      border-radius:999px;
      padding:12px 14px;
      font-size:15px;
      font-weight:700;
      background:#fff;
    }

    .mini-stat{
      font-size:28px;
      font-weight:900;
      line-height:1;
      margin:2px 0 6px;
    }

    .mini-note{
      font-size:13px;
      font-weight:700;
      opacity:.78;
    }

    .section{
      padding:18px;
      margin:18px 0;
    }

    .section-head{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    h2{
      margin:0;
      font-size:clamp(26px, 3.4vw, 40px);
      line-height:1;
      letter-spacing:-1px;
    }

    .sub{
      margin:0;
      font-size:13px;
      font-weight:700;
      opacity:.75;
    }

    .profiles{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
    }

    .profile-card{
      padding:16px;
      border-radius:24px;
    }

    .profile-card:nth-child(4n+1){background:#fff7fb}
    .profile-card:nth-child(4n+2){background:#f2fbff}
    .profile-card:nth-child(4n+3){background:#fffbea}
    .profile-card:nth-child(4n+4){background:#f5fff0}

    .name{
      font-size:28px;
      font-weight:900;
      line-height:1;
      margin-bottom:10px;
      word-break:break-word;
    }

    .blurb{
      font-size:14px;
      font-weight:700;
      margin-bottom:12px;
      line-height:1.45;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:10px;
    }

    .stat{
      border:2px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:10px 11px;
    }

    .stat-label{
      display:block;
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      margin-bottom:5px;
      opacity:.72;
    }

    .stat-value{
      font-size:19px;
      font-weight:900;
      line-height:1;
      word-break:break-word;
    }

    .loading,
    .empty{
      border:3px dashed var(--line);
      border-radius:24px;
      padding:18px;
      background:#fff;
      font-weight:800;
    }

    @media (max-width: 980px){
      .toolbar,
      .profiles,
      .stats{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <span class="kicker">GirlServ / Girlbook</span>
      <h1>📖 Girlbook ♡</h1>
      <p>little profile cards for the room creatures ♡</p>
    </section>

    <section class="toolbar">
      <div class="tool-card">
        <label class="tool-label" for="searchBox">Search profiles</label>
        <input id="searchBox" class="search" type="search" placeholder="type a nick…">
      </div>
      <div class="tool-card">
        <div class="tool-label">Showing</div>
        <div class="mini-stat" id="showingCount">0</div>
        <div class="mini-note">profile cards on display</div>
      </div>
      <div class="tool-card">
        <div class="tool-label">Top loudmouth</div>
        <div class="mini-stat" id="topUser">—</div>
        <div class="mini-note">highest word pile</div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2># Profile cards</h2>
          <p class="sub">little summaries built from each user's stats</p>
        </div>
      </div>
      <div id="profilesWrap" class="loading">Loading girlbook profiles…</div>
    </section>
  </main>

  <script>
    const DATA_URL = "truth_seekers_user_stats.json";

    function formatNum(value) {
      return Number(value || 0).toLocaleString("en-US");
    }

    function safeEntries(raw) {
      return Object.entries(raw || {}).map(([nick, stats]) => ({
        nick,
        words: Number(stats?.words || 0),
        joins: Number(stats?.joins || 0),
        lol: Number(stats?.lol || 0),
        degeneracy: Number(stats?.degeneracy || 0),
        links: Number(stats?.links || 0)
      }));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function moodFor(user) {
      const piles = [
        { key: "words", value: user.words, label: "loudmouth" },
        { key: "joins", value: user.joins, label: "reappearing gremlin" },
        { key: "lol", value: user.lol, label: "giggly menace" },
        { key: "degeneracy", value: user.degeneracy, label: "chaos goblin" },
        { key: "links", value: user.links, label: "link gremlin" }
      ].sort((a, b) => b.value - a.value);

      return piles[0]?.label || "mysterious creature";
    }

    function profileBlurb(user) {
      return `${escapeHtml(user.nick)} is a ${escapeHtml(moodFor(user))} with ${formatNum(user.words)} words, ${formatNum(user.joins)} joins, ${formatNum(user.lol)} lol, ${formatNum(user.degeneracy)} chaos and ${formatNum(user.links)} links logged.`;
    }

    function renderProfiles(list) {
      const wrap = document.getElementById("profilesWrap");

      if (!list.length) {
        wrap.className = "empty";
        wrap.textContent = "No profiles found.";
        return;
      }

      wrap.className = "profiles";
      wrap.innerHTML = list.map(user => `
        <article class="profile-card">
          <div class="name">${escapeHtml(user.nick)}</div>
          <div class="blurb">${profileBlurb(user)}</div>
          <div class="stats">
            <div class="stat">
              <span class="stat-label">words</span>
              <div class="stat-value">${formatNum(user.words)}</div>
            </div>
            <div class="stat">
              <span class="stat-label">joins</span>
              <div class="stat-value">${formatNum(user.joins)}</div>
            </div>
            <div class="stat">
              <span class="stat-label">lol</span>
              <div class="stat-value">${formatNum(user.lol)}</div>
            </div>
            <div class="stat">
              <span class="stat-label">chaos</span>
              <div class="stat-value">${formatNum(user.degeneracy)}</div>
            </div>
            <div class="stat">
              <span class="stat-label">links</span>
              <div class="stat-value">${formatNum(user.links)}</div>
            </div>
            <div class="stat">
              <span class="stat-label">vibe</span>
              <div class="stat-value">${escapeHtml(moodFor(user))}</div>
            </div>
          </div>
        </article>
      `).join("");
    }

    function applySearch(fullList) {
      const search = document.getElementById("searchBox");

      function render() {
        const q = search.value.trim().toLowerCase();
        const filtered = fullList.filter(user => user.nick.toLowerCase().includes(q));

        renderProfiles(filtered.slice(0, 30));
        document.getElementById("showingCount").textContent = formatNum(filtered.slice(0, 30).length);
      }

      search.addEventListener("input", render);
      render();
    }

    async function loadPage() {
      try {
        const response = await fetch(DATA_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("Failed to load girlbook data");
        const raw = await response.json();

        const entries = safeEntries(raw)
          .filter(user => user.nick.toLowerCase() !== "girl")
          .sort((a, b) => b.words - a.words);

        document.getElementById("topUser").textContent = entries[0]?.nick || "—";
        applySearch(entries);
      } catch (error) {
        document.getElementById("profilesWrap").className = "empty";
        document.getElementById("profilesWrap").textContent = "Could not load girlbook profiles.";
      }
    }

    loadPage();
  </script>
</body>
</html>
